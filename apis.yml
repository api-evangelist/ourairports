name: OurAirports
description: >
  OurAirports is an open airport data platform maintained by a global community
  of aviation enthusiasts. It provides a comprehensive, community-maintained
  database of 85,000+ airports, runways, radio navigation aids (navaids), and
  communication frequencies worldwide. All data is released to the public domain
  and is available as daily-updated CSV datasets hosted on GitHub Pages. The
  platform covers airports of every type — from large commercial hubs to small
  private airstrips, heliports, seaplane bases, and balloon ports — across every
  country and territory on Earth.
image: https://ourairports.com/favicon.ico
tags:
  - Aviation
  - Airports
  - Open Data
  - CSV
  - Geospatial
  - Transportation
  - Runways
  - Navaids
  - Public Domain
url: https://ourairports.com
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
apis:
  - name: OurAirports Airports Dataset
    description: >
      Daily-updated CSV dataset containing information on 85,000+ airports
      worldwide, including ICAO/IATA codes, coordinates, elevation, type,
      scheduled service status, and links to official and Wikipedia pages.
    image: https://ourairports.com/favicon.ico
    humanURL: https://ourairports.com/data/
    baseURL: https://davidmegginson.github.io/ourairports-data
    tags:
      - Airports
      - CSV
      - Open Data
      - ICAO
      - IATA
      - Geospatial
    properties:
      - type: Documentation
        url: https://ourairports.com/help/data-dictionary.html
      - type: Download
        url: https://davidmegginson.github.io/ourairports-data/airports.csv
      - type: GitHubRepository
        url: https://github.com/davidmegginson/ourairports-data
    contact:
      - FN: OurAirports Community
        url: https://ourairports.com

  - name: OurAirports Runways Dataset
    description: >
      Daily-updated CSV dataset describing runway surfaces, dimensions, lighting,
      and endpoint coordinates for airports in the OurAirports database. Includes
      both low-end and high-end runway designators with precise heading and
      position data.
    image: https://ourairports.com/favicon.ico
    humanURL: https://ourairports.com/data/
    baseURL: https://davidmegginson.github.io/ourairports-data
