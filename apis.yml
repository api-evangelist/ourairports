        url: https://davidmegginson.github.io/ourairports-data/runways.csv
      - type: GitHubRepository
        url: https://github.com/davidmegginson/ourairports-data
    contact:
      - FN: OurAirports Community
        url: https://ourairports.com

  - name: OurAirports Navaids Dataset
    description: >
      Daily-updated CSV dataset of radio navigation aids (VOR, NDB, DME, TACAN,
      VORTAC, and combinations) associated with airports worldwide. Includes
      frequency, position, power level, usage type, and DME pairing details.
    image: https://ourairports.com/favicon.ico
    humanURL: https://ourairports.com/data/
    baseURL: https://davidmegginson.github.io/ourairports-data
