  - name: OurAirports Countries Dataset
    description: >
      Reference CSV dataset of sovereign states and country-like entities used
      to cross-reference the iso_country field in other OurAirports datasets.
      Includes ISO 3166-1 alpha-2 codes, continent assignments, and Wikipedia links.
