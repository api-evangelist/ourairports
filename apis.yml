        url: https://ourairports.com

  - name: OurAirports Airport Frequencies Dataset
    description: >
      Daily-updated CSV dataset of radio communication frequencies for airports,
      including tower (TWR), ground (GND), ATIS, UNICOM, and remote communications
      outlet (RCO) frequencies in megahertz.
    image: https://ourairports.com/favicon.ico
