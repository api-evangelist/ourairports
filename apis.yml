  - name: OurAirports Regions Dataset
    description: >
      Reference CSV dataset of high-level administrative subdivisions (states,
      provinces, territories) used to cross-reference the iso_region field in the
      airports dataset. Includes ISO 3166-2 codes and local-language keyword synonyms.
